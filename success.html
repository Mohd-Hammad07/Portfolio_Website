<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent – Mohd Hammad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FAFAFB;
      font-family: 'Inter', sans-serif;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(17,24,39,0.1);
      border: 1px solid rgba(79,70,229,0.12);
      animation: pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes pop-in {
      from { opacity: 0; transform: scale(0.88) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .icon {
      width: 80px; height: 80px;
      margin: 0 auto 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: #fff;
      box-shadow: 0 8px 24px rgba(79,70,229,0.35);
    }
    h1 {
      font-family: 'Sora', sans-serif;
      font-size: 1.9rem;
      font-weight: 800;
      color: #111827;
      margin-bottom: 14px;
    }
    p {
      color: #6b7280;
      font-size: 1.05rem;
      line-height: 1.75;
      margin-bottom: 36px;
    }
    a {
      display: inline-block;
      padding: 14px 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(17,24,39,0.2);
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(17,24,39,0.3);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Message Sent!</h1>
    <p>Thanks for reaching out, I'll get back to you as soon as possible.</p>
    <a href="/">← Back to Portfolio</a>
  </div>
</body>
</html>
